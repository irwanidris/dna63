name: DNA63 Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: false

      - name: Pre-build cleanup
        run: |
          rm -rf ~/.gradle/caches/
          flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee full-build-log.txt

      - name: Find APK/AAB files
        if: always()
        run: |
          echo "=== FIND APK/AAB FILES ==="
          find . -type f \( -name "*.apk" -o -name "*.aab" \) | sort || true
          echo ""
          echo "=== LIST BUILD OUTPUTS ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "No outputs directory"
          echo ""
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -n 200 full-build-log.txt || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            full-build-log.txt
            build/app/outputs/**/*.apk
            build/app/outputs/**/*.aab
          retention-days: 7
          if-no-files-found: warn
