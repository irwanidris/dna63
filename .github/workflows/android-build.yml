name: DNA63 Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clean previous builds
        run: |
          flutter clean || true
          rm -rf build/
          rm -rf android/.gradle/

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "org.gradle.configureondemand=false" >> android/gradle.properties
          echo "org.gradle.workers.max=2" >> android/gradle.properties
          cat android/gradle.properties

      - name: Clear stale Gradle locks
        run: |
          rm -rf ~/.gradle/caches/journal-1/*.lock 2>/dev/null || true
          rm -rf ~/.gradle/caches/*/fileHashes/*.lock 2>/dev/null || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android App Bundle (AAB)
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dorg.gradle.daemon=false"
        run: |
          flutter build appbundle --release --verbose

      - name: Build Android APK (Debug for testing)
        if: failure()
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8 -Dorg.gradle.daemon=false"
        run: |
          flutter clean
          flutter build apk --debug

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dna63-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK artifact (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dna63-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Show build output
        run: |
          echo "=== Build Output ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "No outputs folder"
          find build/app/outputs -type f \( -name "*.aab" -o -name "*.apk" \) 2>/dev/null || echo "No artifacts found"
