name: DNA63 Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Configure Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          cat android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android App Bundle (AAB)
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"
        run: |
          flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: dna63-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Show build output
        run: |
          echo "=== Build Output ==="
          ls -lh build/app/outputs/bundle/release/ 2>/dev/null || echo "No release folder found"
          find build/app/outputs -name "*.aab" -type f 2>/dev/null || echo "No AAB found"
