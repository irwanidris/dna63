name: DNA63 Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: false

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee build-log.txt
          echo ""
          echo "=== CHECKING BUILD OUTPUTS ==="
          ls -lh build/app/outputs/flutter-apk/ || echo "flutter-apk folder not found"
          find build -name "*.apk" -type f 2>/dev/null | head -10 || echo "No APK files found anywhere"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
          retention-days: 7
