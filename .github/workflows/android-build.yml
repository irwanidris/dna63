name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Check Android Structure
        run: |
          if [ ! -d "android" ]; then
            echo "❌ Android folder not found! Creating Flutter project structure..."
            flutter create --platforms=android --org=com.rhinoresources . || true
          fi
          echo "✅ Android folder exists"
          mkdir -p android/gradle/wrapper
          ls -la android/

      - name: Create Gradle Wrapper (if missing)
        run: |
          if [ ! -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            mkdir -p android/gradle/wrapper
            echo 'distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-all.zip' > android/gradle/wrapper/gradle-wrapper.properties
            echo "✅ Created gradle-wrapper.properties"
          fi

      - name: Create Settings Gradle KTS (if missing)
        run: |
          if [ ! -f "android/settings.gradle.kts" ]; then
            cat > android/settings.gradle.kts << 'EOF'
          pluginManagement {
              val flutterSdkPath = run {
                  val properties = java.util.Properties()
                  file("local.properties").inputStream().use { properties.load(it) }
                  val flutterSdkPath = properties.getProperty("flutter.sdk")
                  require(flutterSdkPath != null) { "flutter.sdk not set in local.properties" }
                  flutterSdkPath
              }
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id("dev.flutter.flutter-plugin-loader") version "1.0.0"
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          include(":app")
          EOF
            echo "✅ Created settings.gradle.kts"
          fi

      - name: Create App Build Gradle KTS (if missing)
        run: |
          if [ ! -f "android/app/build.gradle.kts" ]; then
            cat > android/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          android {
              namespace = "com.rhinoresources.dna63"
              compileSdk = flutter.compileSdkVersion
              ndkVersion = flutter.ndkVersion
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_17.toString()
              }
              defaultConfig {
                  applicationId = "com.rhinoresources.dna63"
                  minSdk = flutter.minSdkVersion
                  targetSdk = flutter.targetSdkVersion
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          flutter {
              source = "../.."
          }
          EOF
            echo "✅ Created app/build.gradle.kts"
          fi

      - name: Create Root Build Gradle KTS (if missing)
        run: |
          if [ ! -f "android/build.gradle.kts" ]; then
            cat > android/build.gradle.kts << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          val newBuildDir: Directory = rootProject.layout.buildDirectory.dir("../../build").get()
          rootProject.layout.buildDirectory.value(newBuildDir)
          subprojects {
              val newSubprojectBuildDir: Directory = newBuildDir.dir(project.name)
              project.layout.buildDirectory.value(newSubprojectBuildDir)
          }
          subprojects {
              project.evaluationDependsOn(":app")
          }
          tasks.register<Delete>("clean") {
              delete(rootProject.layout.buildDirectory)
          }
          EOF
            echo "✅ Created build.gradle.kts"
          fi

      - name: Create local.properties
        run: |
          cat > android/local.properties << EOF
          flutter.sdk=${{ steps.setup-flutter.outputs.flutter-path }}
          sdk.dir=/usr/local/lib/android/sdk
          EOF
          echo "✅ Created local.properties"

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
        if: success()

      - name: Build Release APK (unsigned)
        run: flutter build apk --release
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
        if: success()
