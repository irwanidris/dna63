name: DNA63 Android Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: false

      - name: Diagnostic - Flutter version
        run: |
          echo "=== Flutter Version ==="
          flutter --version
          echo ""
          echo "=== Dart Version ==="
          dart --version

      - name: Diagnostic - Pubspec check
        run: |
          echo "=== Pubspec.yaml (first 50 lines) ==="
          head -50 pubspec.yaml

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK with verbose logging
        run: flutter build apk --debug -v 2>&1 | tee build-log.txt
        timeout-minutes: 40

      - name: Upload APK artifact (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dna63-debug-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
            build-log.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Final diagnostics
        if: always()
        run: |
          echo "=== Build directory structure ==="
          find build -maxdepth 4 -type f 2>/dev/null | sort || echo "No build directory"
          echo ""
          echo "=== Build log (last 200 lines) ==="
          tail -n 200 build-log.txt 2>/dev/null || echo "No build-log.txt found"
          echo ""
          echo "=== Flutter APK output directory ==="
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No APK output directory"
